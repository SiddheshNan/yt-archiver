<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f0f0f;
      color: #f1f1f1;
      padding: 20px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }
    .header img { width: 28px; height: 28px; }
    .header h1 {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
    }
    label {
      display: block;
      font-size: 12px;
      color: #aaa;
      margin-bottom: 6px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #333;
      border-radius: 8px;
      background: #1a1a1a;
      color: #f1f1f1;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #3EA6FF; }
    input::placeholder { color: #555; }
    button {
      width: 100%;
      margin-top: 14px;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #3EA6FF;
      color: #000;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #65b8ff; }
    .status {
      margin-top: 10px;
      font-size: 12px;
      color: #4caf50;
      text-align: center;
      min-height: 16px;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon48.png" alt="YT Archiver">
    <h1>YT Archiver</h1>
  </div>

  <label for="apiUrl">Archiver API URL</label>
  <input id="apiUrl" type="text" placeholder="http://192.168.1.110:8000">

  <button id="saveBtn">Save</button>
  <div class="status" id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
