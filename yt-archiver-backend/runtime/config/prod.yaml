server:
  host: "0.0.0.0"
  port: 8000
  reload: false
  cors_origins:
    - "http://localhost:3000"
    - "http://localhost:5173"
    - "http://localhost:3100"
    - "https://www.youtube.com"
    - "https://m.youtube.com"
    - "https://music.youtube.com"
    - "https://music.youtube.com"
  serve_frontend: true
  frontend_build_dir: "runtime/frontend-build"

database:
  url: "mongodb://host.docker.internal:27017"
  name: "yt_archiver_dev"

storage:
  videos_dir: "runtime/videos"

tools:
  ytdlp_path: "yt-dlp"
  ffmpeg_path: "ffmpeg"

downloads:
  max_concurrent: 2
  max_retries: 3
  timeout: 7200

logging:
  level: "INFO"
  format: "json"
  log_dir: "runtime/logs"
  log_file: "app.log"
