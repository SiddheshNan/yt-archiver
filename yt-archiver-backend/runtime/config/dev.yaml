server:
  host: "0.0.0.0"
  port: 8000
  reload: true
  cors_origins:
    - "http://localhost:3000"
    - "http://localhost:5173"
    - "http://localhost:3100"
    - "http://localhost:8000"
    - "https://www.youtube.com"
    - "https://m.youtube.com"
    - "https://music.youtube.com"
    - "*"
  serve_frontend: true
  frontend_build_dir: "frontend-build"

database:
  url: "mongodb://localhost:27017"
  name: "yt_archiver_dev"

storage:
  videos_dir: "runtime/videos"

downloads:
  max_concurrent: 1
  max_retries: 3
  timeout: 7200
  cooldown_seconds: 10
  retries: 3
  # Path to Netscape cookies.txt file to bypass YouTube bot detection (e.g. "runtime/config/cookies.txt")
  cookies_file: "runtime/config/cookies.txt"
  # Browser name to extract cookies from (e.g. "chrome", "firefox", "safari")
  browser_cookies: null

logging:
  level: "DEBUG"
  format: "console"
  log_dir: "runtime/logs"
  log_file: "app.log"
