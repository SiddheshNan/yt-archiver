server:
  host: "0.0.0.0"
  port: 8000
  reload: true
  cors_origins:
    - "http://localhost:3000"
    - "http://localhost:5173"
    - "http://localhost:3100"
  serve_frontend: true
  frontend_build_dir: "runtime/frontend-build"

database:
  url: "mongodb://localhost:27017"
  name: "yt_archiver_dev"

storage:
  videos_dir: "runtime/videos"

tools:
  ytdlp_path: "yt-dlp"
  ffmpeg_path: "lib/ffmpeg/ffmpeg"

downloads:
  max_concurrent: 2
  max_retries: 3
  timeout: 3600

logging:
  level: "DEBUG"
  format: "console"
  log_dir: "runtime/logs"
  log_file: "app.log"
